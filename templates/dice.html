<!DOCTYPE html>
<html>
<head>
    <title>Dice Game – Player vs Ghost</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: #fff;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: auto;
            background: rgba(0,0,0,0.7);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .scoreboard {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }
        .score-card {
            background: #333;
            padding: 20px;
            border-radius: 15px;
            width: 200px;
        }
        .score-card h2 {
            margin: 0 0 10px;
        }
        .score-card .score {
            font-size: 48px;
            font-weight: bold;
            margin: 10px 0;
        }
        .current-roll {
            font-size: 80px;
            margin: 20px;
            background: #fff;
            color: #000;
            display: inline-block;
            padding: 20px;
            border-radius: 20px;
            width: 120px;
            height: 120px;
            line-height: 120px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .controls {
            margin: 20px;
        }
        button {
            padding: 12px 24px;
            font-size: 18px;
            margin: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.05);
        }
        .roll-btn {
            background-color: #4caf50;
            color: white;
        }
        .hold-btn {
            background-color: #ff9800;
            color: white;
        }
        .new-btn {
            background-color: #f44336;
            color: white;
        }
        .message {
            font-size: 18px;
            margin: 20px;
            padding: 10px;
            background: #444;
            border-radius: 8px;
        }
        .leaderboard {
            margin-top: 30px;
            background: #222;
            border-radius: 10px;
            padding: 10px;
        }
        .leaderboard table {
            width: 100%;
            border-collapse: collapse;
        }
        .leaderboard th, .leaderboard td {
            padding: 8px;
            border-bottom: 1px solid #444;
        }
        .turn-indicator {
            font-size: 20px;
            font-weight: bold;
            margin: 10px;
        }
        .player-turn {
            color: #4caf50;
        }
        .ghost-turn {
            color: #ff9800;
        }
        @keyframes roll {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .rolling {
            animation: roll 0.3s linear;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🎲 Dice Duel: Player vs 👻 Ghost</h1>
    <p>First to 100 points wins! Roll the dice, but avoid a 1 or you lose your turn points.</p>

    <div class="scoreboard">
        <div class="score-card">
            <h2>👤 You</h2>
            <div class="score" id="playerScore">0</div>
            <div>Turn points: <span id="roundPoints">0</span></div>
        </div>
        <div class="score-card">
            <h2>👻 Ghost</h2>
            <div class="score" id="ghostScore">0</div>
        </div>
    </div>

    <div class="current-roll" id="diceDisplay">🎲</div>

    <div class="turn-indicator" id="turnIndicator">Your turn</div>

    <div class="controls">
        <button class="roll-btn" id="rollBtn">🎲 Roll</button>
        <button class="hold-btn" id="holdBtn">✋ Hold</button>
        <button class="new-btn" id="newGameBtn">🔄 New Game</button>
    </div>

    <div class="message" id="message">Click Roll to start!</div>

    <div class="leaderboard">
        <h3>🏆 Leaderboard (Last 10 Games)</h3>
        <table id="leaderboardTable">
            <thead>
                <tr><th>Winner</th><th>Your Score</th><th>Ghost Score</th><th>Date</th>
            </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    async function loadLeaderboard() {
        const res = await fetch('/api/leaderboard');
        const data = await res.json();
        const tbody = document.querySelector('#leaderboardTable tbody');
        tbody.innerHTML = '';
        data.forEach(game => {
            const row = tbody.insertRow();
            row.insertCell(0).textContent = game.winner === 'player' ? '👤 You' : '👻 Ghost';
            row.insertCell(1).textContent = game.player_score;
            row.insertCell(2).textContent = game.ghost_score;
            row.insertCell(3).textContent = new Date(game.timestamp).toLocaleString();
        });
    }

    async function updateGameState() {
        const res = await fetch('/api/status');
        const state = await res.json();
        updateUI(state);
    }

    function updateUI(state) {
        document.getElementById('playerScore').textContent = state.player_score;
        document.getElementById('ghostScore').textContent = state.ghost_score;
        document.getElementById('roundPoints').textContent = state.round_points;
        document.getElementById('message').textContent = state.message;

        const diceValue = state.current_roll;
        const diceDisplay = document.getElementById('diceDisplay');
        if (diceValue) {
            diceDisplay.textContent = getDiceFace(diceValue);
            diceDisplay.classList.add('rolling');
            setTimeout(() => diceDisplay.classList.remove('rolling'), 300);
        } else {
            diceDisplay.textContent = '🎲';
        }

        const turnIndicator = document.getElementById('turnIndicator');
        if (state.game_over) {
            turnIndicator.textContent = 'Game Over';
        } else if (state.turn === 'player') {
            turnIndicator.innerHTML = '🟢 Your turn';
            turnIndicator.className = 'turn-indicator player-turn';
        } else {
            turnIndicator.innerHTML = '🟠 Ghost\'s turn';
            turnIndicator.className = 'turn-indicator ghost-turn';
        }

        if (state.game_over) {
            document.getElementById('rollBtn').disabled = true;
            document.getElementById('holdBtn').disabled = true;
            loadLeaderboard();
        } else {
            document.getElementById('rollBtn').disabled = false;
            document.getElementById('holdBtn').disabled = false;
        }
    }

    function getDiceFace(value) {
        const faces = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
        return faces[value-1] || '🎲';
    }

    async function roll() {
        const res = await fetch('/api/roll', { method: 'POST' });
        const state = await res.json();
        updateUI(state);
    }

    async function hold() {
        const res = await fetch('/api/hold', { method: 'POST' });
        const state = await res.json();
        updateUI(state);
    }

    async function newGame() {
        const res = await fetch('/api/new', { method: 'POST' });
        const state = await res.json();
        updateUI(state);
    }

    document.getElementById('rollBtn').addEventListener('click', roll);
    document.getElementById('holdBtn').addEventListener('click', hold);
    document.getElementById('newGameBtn').addEventListener('click', newGame);

    updateGameState();
    loadLeaderboard();
</script>
</body>
</html>
